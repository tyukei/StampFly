name: CI

on:
  push:
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PlatformIO
        run: pip install platformio
      # Compiles the EEG→MQTT firmware. .env is absent in CI, so WiFi creds
      # fall back to the defaults baked into eeg_mqtt_drone.cpp (build only).
      - name: Build eeg_mqtt firmware
        run: pio run -e eeg_mqtt
      # Wi-Fi(soft-AP) + WebSocket リモコンファーム (スマホから操作).
      - name: Build wifi_rc firmware
        run: pio run -e wifi_rc
