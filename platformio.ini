; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
lib_deps =
	fastled/FastLED
	tinyu-zhao/INA3221
	knolleary/PubSubClient@^2.8
	bblanchon/ArduinoJson@^6.21.0

; EEG → MQTT drone control firmware (subscribe side).
; Self-contained single-file build. Flash with:  pio run -e eeg_mqtt -t upload
[env:eeg_mqtt]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.arduino.partitions = default.csv
build_src_filter = +<eeg_mqtt_drone.cpp>
build_flags =
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	!python3 scripts/load_env.py
lib_deps =
	fastled/FastLED
	knolleary/PubSubClient@^2.8
	bblanchon/ArduinoJson@^6.21.0

; Wi-Fi(soft-AP) + WebSocket リモコンファーム (スマホ/Androidから操作).
; スマホをWi-Fi「StampFly-RC」に接続し http://192.168.4.1/ を開く。
; 自己完結ビルド。Flash:  pio run -e wifi_rc -t upload
[env:wifi_rc]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.arduino.partitions = default.csv
build_src_filter = +<wifi_rc_drone.cpp> +<imu.cpp>
build_flags =
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
	fastled/FastLED
	bblanchon/ArduinoJson@^6.21.0
	links2004/WebSockets@^2.4.1
